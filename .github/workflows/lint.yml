# This workflow will do a clean install of the dependencies and run the linter
#
# Requires scripts:
# - bin/run_lints.R

name: Lint exercises

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6
        with:
          r-version: 4.3.1

      - uses: r-lib/actions/setup-r-dependencies@a51a8012b0aab7c32ef9d19bf54da93f3254335e
        with:
          cache-version: 1
          packages: |
            lintr

      - name: Run exercism/r ci pre-check (checks config, lint code) for all exercises
        run: |
          source("bin/run_lints.R")
        shell: Rscript {0}
