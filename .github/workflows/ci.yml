# This workflow will do a clean install of the dependencies and run tests across different versions
#
# Requires scripts:
# - bin/run_tests.R

name: Exercise tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "exercises/**"
      - "bin/run_tests.R"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "exercises/**"
      - "bin/run_tests.R"
      - ".github/workflows/ci.yml"

jobs:
  ci:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e
        with:
          r-version: 4.5.2

      - uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6
        with:
          cache-version: 2
          packages: |
            testthat
            jsonlite
            dplyr
            stringr
            purrr
            tibble
            lubridate
            forcats

      - name: Run exercism/r ci (runs tests) for all exercises
        run: |
          source("bin/run_tests.R")
        shell: Rscript {0}
